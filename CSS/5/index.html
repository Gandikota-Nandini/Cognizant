<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body{
            font-family: 'Roboto', sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }
        h1{
            color: #007BFF;
            text-align: center;
            margin-top: 50px;
        }
        p{
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
            line-height: 1.5;
        }
        </style>
</head>
<body>
    <h1>Welcome to CSS Styling</h1>
    <p>This is a sample paragraph to demonstrate CSS styling. It includes various properties such as font-family, background-color, and text-align.</p>
    
</body>
</html>
