<!DOCTYPE html>
<html>

<head>

<style>

table{
    border-collapse:collapse;
    width:80%;
}
th,td{
    border:1px solid black;
    padding:10px;
    text-align:center;
}
th{
    background-color:lightblue;
}

tr:nth-child(even){
    background-color:lightgray;
}
</style>
</head>
<body>
<table>
<tr>
    <th>Event</th>
    <th>Date</th>
</tr>
<tr>
    <td>Music Fest</td>
    <td>10 June</td>
</tr>
<tr>
    <td>Dance Show</td>
    <td>15 June</td>
</tr>
</table>
</body>
</html>
