<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .eventCard{
            border: 1px solid #ccc;
            padding: 16px;
            margin: 16px;

        }
        input:focus{
            border-color: blue;
            outline: none;
        }
        .hidden{
            visibility: hidden;
        }
        .none{
            display: none;
        }
    </style>
</head>
<body>
    <div class="eventCard">
        <h2>Event Title</h2>
        <p>Event Description</p>
       
    </div>
    <input type="text" placeholder="Enter your name">
    <p class="hidden">This text is hidden but takes up space.</p>
    <p class="none">This text is not displayed and does not take up space.</
    
</body>
</html>
