<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
function validateForm() {
    alert("form validated successfully!");
}
function showFee(){
    var fee=document.getElementById("event").value;
    document.getElementById("fee").innerHTML="The fee for the selected event is: "+fee;
}
function confirmSubmission(){
    alert("feedback submitted successfully!");
}
function enlargeImage(img){
    img.style.width="500px";
}
function countChars(){
    var len=document.getElementById("feedback").value.length;
    document.getElementById("charCount").innerHTML="Character count: "+len;

}

    </script>
</head>
<body>
    Phone:<input type="tel" placeholder="Enter phone number" required><br><br>
    <select id="event" onchange="showFee()">
        <option value="">Select Event</option>
        <option value="$50">Music Event</option>
        <option value="$30">Art Exhibition</option>
        <option value="$20">Food Festival</option>
        <option value="$10">Book Event</option>
        <option value="$40">Dance Event</option>
    </select><br><br>
    <p id="fee"></p><br><br>
    <button onclick="confirmSubmission()">Submit Feedback</button><br><br>
    <img src="event.jpg" width="100" ondblclick="enlargeImage(this)"><br><br>
    <textarea id="feedback" placeholder="Enter your feedback" oninput="countChars()"></textarea><br><br>
    <p>characters:<span id="charCount">0</span></p>
</body> 
</html>
