<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        
        function findLocation(){
            navigator.geolocation.getCurrentPosition(
                function(position){
            document.getElementById("location").innerHTML="Lattitude:"
            +position.coords.latitude+"<br>Longitude:"
            +position.coords.longitude;
        },
        function(error){
            alert("Location access denied. Please allow location access to use this feature.");
        },
        {
            enableHighAccuracy:true,
            timeout:5000,
        }
    );
    }
    </script>
</head>
<body>
    <button onclick="findLocation()">Find My Location</button><br><br>
    <div id="location"></div>
    
</body>
</html>
